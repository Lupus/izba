name: _artifacts

on:
  workflow_call:

permissions:
  contents: read

jobs:
  kernel:
    name: vmlinux (pinned 6.12.30)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - name: Restore built vmlinux
        id: vmlinux
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: dist/vmlinux
          key: vmlinux-${{ hashFiles('hack/kernel.config', 'hack/build-kernel.sh') }}
      - name: Install kernel build deps
        if: steps.vmlinux.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential flex bison bc libelf-dev
      - name: Build kernel
        if: steps.vmlinux.outputs.cache-hit != 'true'
        run: hack/build-kernel.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vmlinux
          path: dist/vmlinux
          if-no-files-found: error

  mke2fs:
    name: static mke2fs (pinned e2fsprogs 1.47.2)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools
      - run: hack/build-mke2fs.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mke2fs
          path: dist/mke2fs-*-static-x86_64
          if-no-files-found: error

  nft:
    name: static nft (pinned nftables 1.1.3)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      # docker + file are preinstalled on ubuntu-latest; build-nft.sh builds
      # the static binary in a digest-pinned Alpine container.
      - run: hack/build-nft.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nft
          path: dist/nft
          if-no-files-found: error

  sshd:
    name: static sshd (pinned OpenSSH 9.9p2)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      # docker + file are preinstalled on ubuntu-latest; build-sshd.sh builds
      # the static OpenSSH sshd in a digest-pinned Alpine container.
      - run: hack/build-sshd.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sshd
          path: dist/sshd
          if-no-files-found: error

  initramfs:
    name: initramfs (izba-init + embedded mke2fs + nft + sshd)
    needs: [mke2fs, nft, sshd]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools cpio
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          prefix-key: initramfs
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mke2fs
          path: dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nft
          path: dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sshd
          path: dist/
      - name: Build initramfs with embedded mke2fs + nft + sshd
        run: |
          files=(dist/mke2fs-*-static-x86_64)
          if [ "${#files[@]}" -ne 1 ] || [ ! -f "${files[0]}" ]; then
            echo "expected exactly 1 mke2fs binary, got: ${files[*]}" >&2
            exit 1
          fi
          [ -f dist/nft ] || { echo "expected dist/nft from the nft job" >&2; exit 1; }
          [ -f dist/sshd ] || { echo "expected dist/sshd from the sshd job" >&2; exit 1; }
          chmod 755 "${files[0]}" dist/nft dist/sshd
          IZBA_MKE2FS="${files[0]}" IZBA_NFT=dist/nft IZBA_SSHD=dist/sshd hack/build-initramfs.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: initramfs
          path: dist/initramfs.cpio.gz
          if-no-files-found: error

  erofs-windows:
    name: mkfs.erofs.exe (pinned erofs-utils 1.9.1)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl tar make gcc autoconf automake libtool-bin pkg-config patch \
            gcc-mingw-w64-x86-64
      - run: hack/build-mkfs-erofs-windows.sh
      - name: Emit parity bundle (no wine — exit 2 expected)
        run: |
          set +e
          hack/verify-mkfs-erofs-parity.sh
          rc=$?
          set -e
          # The script exits 2 when wine is absent (true on GitHub runners),
          # emitting dist/erofs-parity-bundle/ for the Windows leg. Exit 0
          # (wine present) would emit no bundle and strand the next step —
          # treat anything but 2 as a failure.
          if [ "$rc" != 2 ]; then
            echo "expected exit 2 (no-wine bundle emission), got $rc" >&2
            exit 1
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: erofs-parity-bundle
          path: dist/erofs-parity-bundle/
          if-no-files-found: error

  erofs-parity:
    name: parity proof (real Windows)
    needs: erofs-windows
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: erofs-parity-bundle
          path: bundle
      - run: pwsh -File hack/spike/verify-mkfs-erofs-parity.ps1 bundle
      - name: Upload verified mkfs.erofs.exe
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mkfs-erofs-windows
          path: bundle/mkfs.erofs.exe
          if-no-files-found: error

  izba-windows:
    name: izba.exe bundle (native MSVC)
    needs: erofs-parity
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          prefix-key: izba-windows-msvc
      - run: cargo build --release -p izba-cli -p izba-jail-helper
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mkfs-erofs-windows
          path: stage/bin/libexec
      - name: Assemble installer-shaped bundle
        # Mirrors hack/stage-izba-windows.sh layout (bin/ + bin/libexec/)
        # minus openvmm.exe, which is fetched-not-built (out of scope; see
        # the design doc) and minus boot artifacts (separate artifacts here).
        # Native MSVC is the source-of-truth Windows toolchain (e2e CI spec,
        # decision 6); the win-gnu cross gates in ci.yml remain as
        # portability tripwires.
        run: |
          mkdir stage/bin -Force | Out-Null
          Copy-Item target/release/izba.exe stage/bin/
          Copy-Item target/release/izba-jail-helper.exe stage/bin/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: izba-windows-bundle
          path: stage/
          if-no-files-found: error

  manifest:
    name: SHA256SUMS + provenance
    needs: [kernel, initramfs, mke2fs, nft, sshd, erofs-parity, izba-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: all
      - name: Write SHA256SUMS + VERSIONS
        run: |
          cd all
          find . -type f -print0 | LC_ALL=C sort -z | xargs -0 sha256sum > SHA256SUMS
          {
            echo "commit: ${{ github.sha }}"
            echo "linux: 6.12.30"
            echo "e2fsprogs: 1.47.2"
            echo "nftables: 1.1.3"
            echo "openssh: 9.9p2"
            echo "erofs-utils: 1.9.1"
            echo "izba-windows-toolchain: msvc (native)"
          } > VERSIONS
          cat SHA256SUMS VERSIONS
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: manifest
          path: |
            all/SHA256SUMS
            all/VERSIONS
          if-no-files-found: error
