name: Mutants

on:
  pull_request:
  schedule:
    - cron: '0 3 * * 1'   # weekly full run, Mon 03:00 UTC (matches e2e.yml)
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write   # collect job upserts the mutation-gaps tracking issue

jobs:
  incremental:
    name: mutation gate (incremental)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0   # need the base branch to compute the merge-base diff
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          prefix-key: mutants-incremental
      - name: Install cargo-mutants
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-mutants
      - name: Fetch base ref
        # Explicit refspec so the base lands in refs/remotes/origin/<base> — a
        # bare `git fetch origin <base>` only updates FETCH_HEAD, leaving
        # `origin/<base>` unresolvable and the gate's `git diff` fatal.
        run: git fetch --no-tags origin "+refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
      - name: Incremental mutation gate
        run: hack/mutants-gate.sh "origin/${{ github.base_ref }}"

  full-shard:
    name: full mutation run (shard ${{ matrix.shard }}/8)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # cargo-mutants --shard is 0-INDEXED (0/8..7/8). The docs' "1/4" example
        # is misleading: shard N/N is always empty and the i%N==0 class is dropped,
        # so 1/8..8/8 would silently lose 1/8 of all mutants. Verified 0/8..7/8 is a
        # complete, non-overlapping partition. The collect job reports the tested
        # count so any future partition gap is loud, not silent.
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          prefix-key: mutants-full
      - name: Install cargo-mutants
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-mutants
      - name: Run shard (non-zero exit on survivors is expected; do not fail)
        run: cargo mutants --shard ${{ matrix.shard }}/8 -o shard-out || true
      - name: Upload shard results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutants-shard-${{ matrix.shard }}
          path: shard-out/mutants.out
          if-no-files-found: warn

  collect:
    name: collect + publish worklist
    # Run as long as the workflow wasn't cancelled, even if some shards failed or
    # timed out — publish a partial worklist from whatever shards uploaded rather
    # than nothing. The "tested N mutants" line makes partial coverage visible.
    if: ${{ !cancelled() && github.event_name != 'pull_request' }}
    needs: full-shard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - name: Download all shard results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: mutants-shard-*
          path: shards
      - name: Merge shards into report
        id: merge
        run: |
          python3 hack/mutants-report.py --mode full \
            --json-out mutants-report.json --md-out mutants-report.md \
            --issue-out mutants-issue.md \
            shards/mutants-shard-*
          cat mutants-report.md >> "$GITHUB_STEP_SUMMARY"
          tested=$(python3 -c "import json;print(json.load(open('mutants-report.json'))['tested'])")
          echo "tested=$tested" >> "$GITHUB_OUTPUT"
      - name: Upload merged report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutants-report
          path: |
            mutants-report.json
            mutants-report.md
          if-no-files-found: warn
      - name: Upsert tracking issue
        # Only when shards actually contributed results — tested==0 means a broken
        # run (no shard artifacts), and we must not post a misleading "no gaps" issue.
        if: ${{ steps.merge.outputs.tested != '0' }}
        run: hack/mutants-issue.sh mutants-issue.md
