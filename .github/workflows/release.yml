name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  version:
    name: Derive version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - id: v
        run: |
          ref="${{ github.ref }}"
          if [[ "$ref" == refs/tags/v* ]]; then
            echo "version=${ref#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            base=$(grep -m1 '^version' crates/izba-cli/Cargo.toml | cut -d'"' -f2)
            echo "version=${base}~git$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

  gate:
    name: Build/test gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - run: |
          rustup target add x86_64-unknown-linux-musl x86_64-pc-windows-gnu
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools gcc-mingw-w64-x86-64
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo fmt --check
      - run: cargo build -p izba-init --target x86_64-unknown-linux-musl --release
      - run: cargo check --target x86_64-pc-windows-gnu -p izba-proto -p izba-core -p izba-cli
      - run: cargo clippy --target x86_64-pc-windows-gnu --all-targets -p izba-proto -p izba-core -p izba-cli -- -D warnings

  artifacts:
    name: Build artifacts
    needs: gate
    uses: ./.github/workflows/_artifacts.yml

  izba-linux-bin:
    name: izba (linux release binary)
    needs: gate
    # Pinned to 22.04 (glibc 2.35) so the shipped binary — and thus the .deb —
    # runs on Ubuntu 22.04 AND 24.04 (glibc is backward-compatible). Building on
    # 24.04 would hard-require glibc 2.39 at runtime, which `Depends: libc6`
    # cannot pre-catch.
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          prefix-key: izba-linux
      - run: cargo build --release -p izba-cli
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: izba-linux-bin
          path: target/release/izba
          if-no-files-found: error

  package-deb:
    name: Build .deb
    needs: [version, artifacts, izba-linux-bin]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: izba-linux-bin
          path: dl/bin
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: vmlinux
          path: dl/art
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: initramfs
          path: dl/art
      - name: Fetch pinned cloud-hypervisor + virtiofsd
        run: |
          IZBA_BIN_DIR="$PWD/dl/vmm" hack/fetch-artifacts.sh || true
          test -f dl/vmm/cloud-hypervisor
          test -f dl/vmm/virtiofsd
      - name: Build the .deb
        env:
          IZBA_BIN: ${{ github.workspace }}/dl/bin/izba
          IZBA_CH: ${{ github.workspace }}/dl/vmm/cloud-hypervisor
          IZBA_VIRTIOFSD: ${{ github.workspace }}/dl/vmm/virtiofsd
          IZBA_VMLINUX: ${{ github.workspace }}/dl/art/vmlinux
          IZBA_INITRAMFS: ${{ github.workspace }}/dl/art/initramfs.cpio.gz
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          chmod +x dl/bin/izba dl/vmm/cloud-hypervisor dl/vmm/virtiofsd
          packaging/build-deb.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: izba-deb
          path: dist/izba_*_amd64.deb
          if-no-files-found: error

  package-windows:
    name: Build Windows installer
    needs: [version, artifacts]
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: izba-windows-bundle
          path: stage
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: vmlinux
          path: stage/artifacts
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: initramfs
          path: stage/artifacts
      - name: Restore pinned openvmm.exe
        id: openvmm
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: dist/openvmm.exe
          key: openvmm-run-27240809751
      - name: Fetch pinned openvmm.exe (cache miss)
        if: steps.openvmm.outputs.cache-hit != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: hack/fetch-openvmm.sh
      - name: Stage openvmm.exe into libexec
        shell: bash
        run: |
          mkdir -p stage/bin/libexec
          cp dist/openvmm.exe stage/bin/libexec/openvmm.exe
      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $stage = Join-Path $env:GITHUB_WORKSPACE 'stage'
          $out = Join-Path $env:GITHUB_WORKSPACE 'dist'
          # /O overrides the .iss OutputDir (which is relative to the .iss file,
          # i.e. packaging\windows\dist) so the installer lands in repo-root dist\.
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=${{ needs.version.outputs.version }}" `
            "/DStageDir=$stage" `
            "/O$out" `
            packaging\windows\izba.iss
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: izba-windows-installer
          path: dist/izba-setup-*.exe
          if-no-files-found: error

  release:
    name: Attach to GitHub Release
    needs: [version, package-deb, package-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: izba-deb
          path: rel
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: izba-windows-installer
          path: rel
      - name: SHA256SUMS
        run: cd rel && sha256sum * > SHA256SUMS && cat SHA256SUMS
      - uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          files: |
            rel/izba_*_amd64.deb
            rel/izba-setup-*.exe
            rel/SHA256SUMS

  smoke:
    name: Dispatch smoke (verify installers)
    needs: [package-deb, package-windows]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: izba-deb
          path: smoke
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: izba-windows-installer
          path: smoke
      - name: Verify .deb layout + symlink
        run: |
          set -euo pipefail
          deb=$(ls smoke/izba_*_amd64.deb)
          contents=$(dpkg-deb --contents "$deb")
          {
            echo "### izba release smoke"
            echo '```'
            dpkg-deb --info "$deb" | grep -E 'Package|Version|Architecture|Depends'
            echo "$contents"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          for p in \
            usr/lib/izba/bin/izba \
            usr/lib/izba/bin/libexec/cloud-hypervisor \
            usr/lib/izba/bin/libexec/virtiofsd \
            usr/lib/izba/artifacts/vmlinux \
            usr/lib/izba/artifacts/initramfs.cpio.gz; do
            echo "$contents" | grep -qF "$p" || { echo "MISSING in .deb: $p" >&2; exit 1; }
          done
          echo "$contents" | grep -qF 'usr/bin/izba -> ../lib/izba/bin/izba' \
            || { echo "MISSING/incorrect /usr/bin/izba symlink" >&2; exit 1; }
          echo "deb layout OK"
      - name: Verify Windows installer present + non-trivial
        run: |
          set -euo pipefail
          exe=$(ls smoke/izba-setup-*.exe)
          sz=$(stat -c%s "$exe")
          echo "installer: $exe ($sz bytes)"
          # A real installer bundles the kernel + initramfs + tools; anything
          # under ~1 MiB means a packaging failure produced a stub.
          [ "$sz" -gt 1000000 ] || { echo "installer suspiciously small ($sz bytes)" >&2; exit 1; }
          echo "windows installer OK" >> "$GITHUB_STEP_SUMMARY"
