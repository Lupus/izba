name: App CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  app-linux:
    name: app frontend + backend (linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      # Harden apt against the chronically flaky azure.archive.ubuntu.com mirror
      # (actions/runner-images#675): bound each fetch + retry so a stalled
      # connection can't wedge the job until the timeout. Written to apt.conf.d
      # so it also governs cache-apt-pkgs-action's internal apt-get on a cache
      # miss (the cold-cache path that still hits the mirror).
      - name: Harden apt (retries + fetch timeouts)
        run: |
          printf 'Acquire::Retries "5";\nAcquire::http::Timeout "30";\nAcquire::https::Timeout "30";\n' \
            | sudo tee /etc/apt/apt.conf.d/99izba-ci-retries
      # Cache the libwebkit2gtk-4.1-dev dependency closure (the GStreamer/Pulse
      # multimedia stack — hundreds of packages) so warm runs skip the mirror
      # entirely instead of re-downloading it every time. Cold runs fall back to
      # apt under the retry/timeout config above.
      - name: Install Tauri system deps
        uses: awalsh128/cache-apt-pkgs-action@681749ae568c81c2037cb9185e38b709b261bd2f # v1.6.1
        with:
          packages: >-
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev
            librsvg2-dev build-essential file libxdo-dev libssl-dev patchelf
          version: 1.0
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          prefix-key: app-linux
          workspaces: app/src-tauri
      - name: npm ci
        working-directory: app
        run: npm ci
      - name: frontend build (tsc typecheck + vite)
        working-directory: app
        run: npm run build
      - name: frontend tests
        working-directory: app
        run: npm run test
      - name: backend fmt
        working-directory: app/src-tauri
        run: cargo fmt --check
      - name: backend clippy
        working-directory: app/src-tauri
        run: cargo clippy --all-targets -- -D warnings
      - name: backend tests
        working-directory: app/src-tauri
        run: cargo test

  app-windows:
    name: app frontend + backend (windows)
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          prefix-key: app-windows
          workspaces: app/src-tauri
      - name: npm ci
        working-directory: app
        run: npm ci
      - name: frontend build (tsc typecheck + vite)
        working-directory: app
        run: npm run build
      - name: frontend tests
        working-directory: app
        run: npm run test
      - name: backend clippy
        working-directory: app/src-tauri
        run: cargo clippy --all-targets -- -D warnings
      - name: backend tests
        working-directory: app/src-tauri
        run: cargo test
