name: E2E

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'   # weekly drift check, Mon 03:00 UTC (see spec)
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  kernel:
    name: vmlinux (pinned 6.12.30)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - name: Restore built vmlinux
        id: vmlinux
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: dist/vmlinux
          key: vmlinux-${{ hashFiles('hack/kernel.config', 'hack/build-kernel.sh') }}
      - name: Install kernel build deps
        if: steps.vmlinux.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential flex bison bc libelf-dev
      - name: Build kernel
        if: steps.vmlinux.outputs.cache-hit != 'true'
        run: hack/build-kernel.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vmlinux
          path: dist/vmlinux
          if-no-files-found: error

  mke2fs:
    name: static mke2fs (pinned e2fsprogs 1.47.2)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools
      - run: hack/build-mke2fs.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mke2fs
          path: dist/mke2fs-*-static-x86_64
          if-no-files-found: error

  nft:
    name: static nft (pinned nftables 1.1.3)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      # docker + file are preinstalled on ubuntu-latest; build-nft.sh builds
      # the static binary in a digest-pinned Alpine container.
      - run: hack/build-nft.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nft
          path: dist/nft
          if-no-files-found: error

  initramfs:
    name: initramfs (izba-init + embedded mke2fs + nft)
    needs: [mke2fs, nft]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools cpio
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          prefix-key: initramfs
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mke2fs
          path: dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nft
          path: dist/
      - name: Build initramfs with embedded mke2fs + nft
        run: |
          files=(dist/mke2fs-*-static-x86_64)
          if [ "${#files[@]}" -ne 1 ] || [ ! -f "${files[0]}" ]; then
            echo "expected exactly 1 mke2fs binary, got: ${files[*]}" >&2
            exit 1
          fi
          [ -f dist/nft ] || { echo "expected dist/nft from the nft job" >&2; exit 1; }
          chmod 755 "${files[0]}" dist/nft
          IZBA_MKE2FS="${files[0]}" IZBA_NFT=dist/nft hack/build-initramfs.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: initramfs
          path: dist/initramfs.cpio.gz
          if-no-files-found: error

  erofs-exe:
    name: mkfs.erofs.exe (pinned erofs-utils 1.9.1)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl tar make gcc autoconf automake libtool-bin pkg-config patch \
            gcc-mingw-w64-x86-64
      - run: hack/build-mkfs-erofs-windows.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-mkfs-erofs-windows
          path: dist/mkfs.erofs.exe
          if-no-files-found: error

  linux-kvm:
    name: KVM e2e (integration + daemon + tty + ttystorm)
    needs: [kernel, initramfs]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      IZBA_KERNEL: ${{ github.workspace }}/dist/vmlinux
      IZBA_INITRAMFS: ${{ github.workspace }}/dist/initramfs.cpio.gz
      IZBA_TEST_CACHE: /home/runner/.cache/izba-itest
      IZBA_BOOT_TIMEOUT_SECS: '120'
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - name: Make /dev/kvm accessible
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm || true
          ls -l /dev/kvm
          [ -r /dev/kvm ] && [ -w /dev/kvm ]
      # passt is gone as of M1 — egress now rides izbad over vsock, so the
      # guest is a NIC-less vsock island and no host NAT helper is needed
      # (the apparmor userns workaround that static passt required is gone too).
      - name: Restore runtime tools
        id: tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.local/bin/cloud-hypervisor
            ~/.local/bin/virtiofsd
            ~/.local/bin/mkfs.erofs
          key: e2e-tools-${{ hashFiles('hack/fetch-artifacts.sh', 'hack/build-mkfs-erofs-windows.sh') }}
      - name: Build runtime tools (cache miss)
        if: steps.tools.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl tar make gcc autoconf automake libtool-bin pkg-config patch \
            unzip file
          mkdir -p "$HOME/.local/bin"
          IZBA_BIN_DIR="$HOME/.local/bin" hack/fetch-artifacts.sh || true
          hack/build-mkfs-erofs-windows.sh --linux-only
          install -m755 "$HOME/.cache/izba/erofs-utils/build-linux/mkfs/mkfs.erofs" "$HOME/.local/bin/mkfs.erofs"
      - name: Assert tools present
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          for t in cloud-hypervisor virtiofsd mkfs.erofs; do
            command -v "$t" || { echo "missing $t" >&2; exit 1; }
          done
          mkfs.erofs --version
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: vmlinux
          path: dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: initramfs
          path: dist/
      - name: Restore OCI test-image cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /home/runner/.cache/izba-itest
          key: izba-itest-alpine-3.20
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          prefix-key: e2e-linux
      - name: Integration suite (real KVM VMs, incl. izbad egress)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          IZBA_INTEGRATION=1 cargo test -p izba-core --test integration -- --test-threads=1 --nocapture
      - name: Daemon e2e (lifecycle suite)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          IZBA_INTEGRATION=1 cargo test -p izba-cli --test daemon_e2e -- --test-threads=1 --nocapture
      - name: tty Tier-1 scripted (no VM)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          cargo test -p izba-cli --features ttytests --test tty_scripted -- --test-threads=1 --nocapture
      - name: tty Tier-2 e2e
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          mkdir -p "$RUNNER_TEMP/tty-data"
          IZBA_TTY_E2E=1 IZBA_DATA_DIR="$RUNNER_TEMP/tty-data" \
            cargo test -p izba-cli --features ttytests --test tty_e2e -- --test-threads=1 --nocapture
      - name: ttystorm M0 churn gate
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          cargo build --locked --release -p izba-cli
          cargo build --locked --release -p izba-core --example ttystorm
          mkdir -p "$RUNNER_TEMP/storm-data"
          IZBA_DATA_DIR="$RUNNER_TEMP/storm-data" \
          IZBA_EXE="$PWD/target/release/izba" \
          TTYSTORM_EXE="$PWD/target/release/examples/ttystorm" \
            hack/ci/ttystorm-gate.sh
      - name: Upload sandbox logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-kvm-failure-logs
          path: |
            ${{ runner.temp }}/tty-data/sandboxes/*/logs/*
            ${{ runner.temp }}/storm-data/sandboxes/*/logs/*
          if-no-files-found: ignore

  # Real-VM host-side coverage (Phase 2). Deliberately SEPARATE from the
  # authoritative linux-kvm gate so a coverage-instrumentation problem can never
  # break the gate, and gated to non-push events (weekly cron + manual dispatch)
  # so it does not double the real-VM minutes on every main push. It runs the
  # host workspace suite AND the gated real-VM suites under a single
  # llvm-cov-instrumented shell, so the report is a genuine host+e2e MERGE in one
  # self-contained job (no fragile cross-workflow lcov merge). Windows (WHP) is
  # not coverage-instrumented — its paths differ and absolute paths would not
  # merge; it is reported separately if/when needed. The guest-side izba-init
  # running INSIDE the microVM is not capturable; its host-testable modules are
  # already covered by the host suite.
  linux-kvm-coverage:
    name: KVM e2e host-side coverage
    needs: [kernel, initramfs]
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      IZBA_KERNEL: ${{ github.workspace }}/dist/vmlinux
      IZBA_INITRAMFS: ${{ github.workspace }}/dist/initramfs.cpio.gz
      IZBA_TEST_CACHE: /home/runner/.cache/izba-itest
      IZBA_BOOT_TIMEOUT_SECS: '120'
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0  # full history → accurate Sonar new-code detection & blame
      - name: Make /dev/kvm accessible
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm || true
          ls -l /dev/kvm
          [ -r /dev/kvm ] && [ -w /dev/kvm ]
      - name: Restore runtime tools
        id: tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.local/bin/cloud-hypervisor
            ~/.local/bin/virtiofsd
            ~/.local/bin/mkfs.erofs
          key: e2e-tools-${{ hashFiles('hack/fetch-artifacts.sh', 'hack/build-mkfs-erofs-windows.sh') }}
      - name: Build runtime tools (cache miss)
        if: steps.tools.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl tar make gcc autoconf automake libtool-bin pkg-config patch \
            unzip file
          mkdir -p "$HOME/.local/bin"
          IZBA_BIN_DIR="$HOME/.local/bin" hack/fetch-artifacts.sh || true
          hack/build-mkfs-erofs-windows.sh --linux-only
          install -m755 "$HOME/.cache/izba/erofs-utils/build-linux/mkfs/mkfs.erofs" "$HOME/.local/bin/mkfs.erofs"
      - name: Assert tools present
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          for t in cloud-hypervisor virtiofsd mkfs.erofs; do
            command -v "$t" || { echo "missing $t" >&2; exit 1; }
          done
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: vmlinux
          path: dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: initramfs
          path: dist/
      - name: Restore OCI test-image cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /home/runner/.cache/izba-itest
          key: izba-itest-alpine-3.20
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          prefix-key: e2e-coverage
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-llvm-cov
      - name: Measure host-side coverage (host suite + real-VM e2e, merged)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          # Single shell so the instrumentation env from show-env persists across
          # every cargo invocation below (the documented robust pattern; the
          # multi-step $GITHUB_ENV variant is undocumented + fragile). Validated
          # locally against real KVM before landing.
          source <(cargo llvm-cov show-env --export-prefix)
          cargo llvm-cov clean --workspace
          # Report-only: a flaky/failing suite must not abort the whole run and
          # wipe the report. The linux-kvm gate is the authoritative test gate.
          set +e
          cargo test --workspace
          IZBA_INTEGRATION=1 cargo test -p izba-core --test integration -- --test-threads=1
          IZBA_INTEGRATION=1 cargo test -p izba-cli --test daemon_e2e -- --test-threads=1
          set -e
          # Separator-agnostic so the same pattern works on Windows backslash paths.
          IGNORE='([\\/]tests[\\/]|[\\/]target[\\/]|[\\/]build\.rs$)'
          mkdir -p target/coverage
          cargo llvm-cov report --lcov --output-path target/coverage/lcov-e2e.info --ignore-filename-regex "$IGNORE"
          cargo llvm-cov report --json --output-path target/coverage/coverage-e2e.json --ignore-filename-regex "$IGNORE"
          cargo llvm-cov report --html --output-dir target/coverage/html-e2e --ignore-filename-regex "$IGNORE"
          python3 hack/coverage_report.py target/coverage/coverage-e2e.json \
            --out target/coverage/coverage-gaps-e2e.md \
            --title "Coverage gap report (host suite + real-VM e2e)"
      - name: Publish gap report to step summary
        if: always()
        run: |
          if [ -f target/coverage/coverage-gaps-e2e.md ]; then
            cat target/coverage/coverage-gaps-e2e.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "e2e coverage gap report not produced (coverage run failed)" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload e2e coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report-e2e
          path: |
            target/coverage/coverage-gaps-e2e.md
            target/coverage/lcov-e2e.info
            target/coverage/coverage-e2e.json
            target/coverage/html-e2e
          if-no-files-found: warn
      # Frontend (app/) coverage for the main-branch scan below, so the Tauri
      # app isn't shown as 0%-covered on the dashboard. The app is a separate
      # npm project outside the cargo workspace; vitest emits app/-relative
      # lcov, rewritten to repo-root-relative to resolve against the scanned tree.
      - name: Frontend coverage (vitest lcov)
        if: always()
        working-directory: app
        run: |
          npm ci --ignore-scripts
          npm run test:coverage
      # Guard on the file existing: if the vitest step above failed the lcov is
      # absent, and `sed -i` on a missing file would exit non-zero. `if: always()`
      # (or `!cancelled()`) would still run it after that failure — gating on
      # hashFiles is the only form that actually skips the missing-file case.
      - name: Rewrite frontend lcov paths to repo-root-relative
        if: ${{ hashFiles('app/coverage/lcov.info') != '' }}
        run: sed -i 's|^SF:|SF:app/|' app/coverage/lcov.info
      # SonarCloud main-branch analysis with the richer host+real-VM report.
      # This job runs on schedule + workflow_dispatch (never on push), so the
      # main coverage on the Sonar dashboard refreshes on that cadence — a
      # manual `Run workflow` on E2E refreshes it on demand. continue-on-error
      # so a Sonar/network hiccup can never turn the e2e run red; the report
      # artifact above is the durable record either way.
      - name: SonarQube Scan (main, host + real-VM coverage)
        if: ${{ always() && hashFiles('target/coverage/lcov-e2e.info') != '' }}
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.rust.lcov.reportPaths=target/coverage/lcov-e2e.info
      - name: Upload sandbox logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-kvm-coverage-failure-logs
          path: |
            ${{ runner.temp }}/**/sandboxes/*/logs/*
            ~/.local/share/izba/sandboxes/*/logs/*
          if-no-files-found: ignore

  windows-whp:
    name: WHP e2e (validate + tty + ttystorm)
    needs: [kernel, initramfs, erofs-exe]
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      IZBA_KERNEL: ${{ github.workspace }}\dist\vmlinux
      IZBA_INITRAMFS: ${{ github.workspace }}\dist\initramfs.cpio.gz
      IZBA_OPENVMM: ${{ github.workspace }}\dist\openvmm.exe
      IZBA_MKFS_EROFS: ${{ github.workspace }}\dist\mkfs.erofs.exe
      IZBA_BOOT_TIMEOUT_SECS: '120'
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: vmlinux
          path: dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: initramfs
          path: dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: e2e-mkfs-erofs-windows
          path: dist/
      - name: Restore pinned openvmm.exe
        id: openvmm
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: dist/openvmm.exe
          key: openvmm-run-27240809751
      - name: Fetch pinned openvmm.exe (cache miss)
        if: steps.openvmm.outputs.cache-hit != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: hack/fetch-openvmm.sh
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          prefix-key: e2e-windows
      # bash, not pwsh: fail-fast between the two builds (pwsh only gates the
      # step on the LAST native command's exit code).
      - name: Build izba.exe + ttystorm.exe + confine_probe.exe (native MSVC)
        shell: bash
        run: |
          cargo build --locked --release -p izba-cli
          cargo build --locked --release -p izba-core --example ttystorm
          cargo build --locked --release -p izba-core --example confine_probe
      - name: Windows validation suite (21 checks)
        env:
          IZBA_EXE: ${{ github.workspace }}\target\release\izba.exe
          IZBA_CONFINE_PROBE: ${{ github.workspace }}\target\release\examples\confine_probe.exe
        run: pwsh -NoProfile -File hack/spike/validate-izba-windows.ps1
      # Non-tty M0 gate runs before the tty steps so its signal is never
      # lost behind a tty failure.
      - name: ttystorm M0 churn gate
        env:
          IZBA_EXE: ${{ github.workspace }}\target\release\izba.exe
          TTYSTORM_EXE: ${{ github.workspace }}\target\release\examples\ttystorm.exe
          IZBA_DATA_DIR: ${{ runner.temp }}\storm-data
        run: pwsh -NoProfile -File hack/ci/ttystorm-gate.ps1
      # ConPTY canary: spawn a trivial child through ConPTY and require its
      # output to reach the parser (izba-ttytest's own smoke test — no izba,
      # no sockets, no VM). GitHub-hosted Windows runners historically lost ALL
      # ConPTY child output (verified 2026-06-12, run 27445265822), forcing the
      # tty tests to auto-skip. We now sideload a modern, pinned ConPTY backend
      # (conpty.dll + OpenConsole.exe) so portable-pty bypasses the host's
      # stale system conhost; if the canary then passes, the tty tests run for
      # real. If it still fails, the tests skip as before (no regression).
      # See .github/workflows/conpty-diag.yml for the standalone diagnosis.
      - name: ConPTY environment diagnostics
        continue-on-error: true
        run: pwsh -NoProfile -File hack/ci/conpty-diag.ps1
      - name: Stage bundled ConPTY redist (sideload over system conhost)
        run: pwsh -NoProfile -File hack/ci/stage-conpty.ps1 -TargetDir target/debug/deps
      - name: tty harness ConPTY canary
        id: conpty
        shell: bash
        run: |
          if cargo test -p izba-ttytest --test harness_smoke fixture_banner_echo_and_exit -- --nocapture; then
            echo "works=true" >> "$GITHUB_OUTPUT"
          else
            echo "works=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=tty tests skipped::ConPTY child output still does not flow even with a sideloaded backend; tty Tier-1/Tier-2 skipped (see docs/testing.md and conpty-diag.yml)"
          fi
      - name: tty Tier-1 scripted (no VM)
        if: steps.conpty.outputs.works == 'true'
        run: cargo test -p izba-cli --features ttytests --test tty_scripted -- --test-threads=1 --nocapture
      - name: tty Tier-2 e2e
        if: steps.conpty.outputs.works == 'true'
        env:
          IZBA_TTY_E2E: '1'
          IZBA_DATA_DIR: ${{ runner.temp }}\tty-data
        run: cargo test -p izba-cli --features ttytests --test tty_e2e -- --test-threads=1 --nocapture
      - name: Upload sandbox logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-whp-failure-logs
          path: |
            ~\AppData\Local\izba\sandboxes\*\logs\*
            ${{ runner.temp }}\tty-data\sandboxes\*\logs\*
            ${{ runner.temp }}\storm-data\sandboxes\*\logs\*
          if-no-files-found: ignore

  # Real-VM host-side coverage on Windows/WHP (Phase 2). Same posture as
  # linux-kvm-coverage: SEPARATE from the windows-whp gate (instrumentation can
  # never break it), gated to weekly cron + manual dispatch. It covers the real
  # OpenVMM/WHP driver host paths (vmm/openvmm.rs + Windows-specific code) that
  # neither the Linux fast suite nor the KVM e2e can reach. Reported as its OWN
  # platform artifact (coverage-report-e2e-windows) — Windows lcov is NOT merged
  # with the Linux reports: the code paths differ and the absolute/backslash
  # paths would not align, so a cross-platform merge would corrupt the report.
  #
  # NOTE: unlike the KVM leg, this was NOT validated locally (Windows coverage
  # needs WHP + OpenVMM); it mirrors the KVM-validated single-shell pattern
  # (bash sources show-env, then invokes the pwsh validation suite as a child so
  # the instrumented izba.exe it spawns inherits LLVM_PROFILE_FILE). It is
  # report-only and isolated, so a first-run issue surfaces on the weekly run
  # without affecting any gate.
  windows-whp-coverage:
    name: WHP e2e host-side coverage
    needs: [kernel, initramfs, erofs-exe]
    if: github.event_name != 'push'
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      IZBA_KERNEL: ${{ github.workspace }}\dist\vmlinux
      IZBA_INITRAMFS: ${{ github.workspace }}\dist\initramfs.cpio.gz
      IZBA_OPENVMM: ${{ github.workspace }}\dist\openvmm.exe
      IZBA_MKFS_EROFS: ${{ github.workspace }}\dist\mkfs.erofs.exe
      # Instrumented binaries are slower; give boots more headroom than the gate.
      IZBA_BOOT_TIMEOUT_SECS: '240'
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: vmlinux
          path: dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: initramfs
          path: dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: e2e-mkfs-erofs-windows
          path: dist/
      - name: Restore pinned openvmm.exe
        id: openvmm
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: dist/openvmm.exe
          key: openvmm-run-27240809751
      - name: Fetch pinned openvmm.exe (cache miss)
        if: steps.openvmm.outputs.cache-hit != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: hack/fetch-openvmm.sh
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          prefix-key: e2e-windows-coverage
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-llvm-cov
      - name: Measure Windows host-side coverage (host suite + WHP validation)
        shell: bash
        env:
          # Windows-style path so the pwsh validation suite resolves it; the
          # instrumented izba.exe it spawns inherits LLVM_PROFILE_FILE from this
          # step's environment.
          IZBA_EXE: ${{ github.workspace }}\target\release\izba.exe
          # Same release output dir as izba.exe (llvm-cov instruments via env, not
          # a separate target dir) so the [10] confinement check has its probe and
          # does not fail-closed with a misleading failure in the coverage report.
          IZBA_CONFINE_PROBE: ${{ github.workspace }}\target\release\examples\confine_probe.exe
        run: |
          # Single shell: the show-env instrumentation env persists across every
          # cargo invocation AND is inherited by the pwsh child below.
          source <(cargo llvm-cov show-env --export-prefix)
          cargo llvm-cov clean --workspace
          # Report-only: a failing suite must not abort the run and wipe the
          # report. windows-whp remains the authoritative Windows gate.
          set +e
          cargo test --locked -p izba-proto -p izba-core -p izba-cli
          cargo build --locked --release -p izba-cli
          cargo build --locked --release -p izba-core --example confine_probe
          pwsh -NoProfile -File hack/spike/validate-izba-windows.ps1
          set -e
          # Separator-agnostic regex: llvm-cov emits backslash paths on Windows.
          IGNORE='([\\/]tests[\\/]|[\\/]target[\\/]|[\\/]build\.rs$)'
          mkdir -p target/coverage
          cargo llvm-cov report --lcov --output-path target/coverage/lcov-e2e-windows.info --ignore-filename-regex "$IGNORE"
          cargo llvm-cov report --json --output-path target/coverage/coverage-e2e-windows.json --ignore-filename-regex "$IGNORE"
          cargo llvm-cov report --html --output-dir target/coverage/html-e2e-windows --ignore-filename-regex "$IGNORE"
          # `python` is the reliable interpreter name on windows-latest; keep the
          # gap report non-fatal so lcov/json/html still upload if it hiccups.
          python hack/coverage_report.py target/coverage/coverage-e2e-windows.json \
            --out target/coverage/coverage-gaps-e2e-windows.md \
            --title "Coverage gap report (Windows WHP e2e)" || echo "gap report generation failed"
      - name: Publish gap report to step summary
        if: always()
        shell: bash
        run: |
          if [ -f target/coverage/coverage-gaps-e2e-windows.md ]; then
            cat target/coverage/coverage-gaps-e2e-windows.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Windows e2e coverage gap report not produced (coverage run failed)" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload Windows e2e coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report-e2e-windows
          path: |
            target/coverage/coverage-gaps-e2e-windows.md
            target/coverage/lcov-e2e-windows.info
            target/coverage/coverage-e2e-windows.json
            target/coverage/html-e2e-windows
          if-no-files-found: warn
      - name: Upload sandbox logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-whp-coverage-failure-logs
          path: |
            ~\AppData\Local\izba\sandboxes\*\logs\*
            ${{ runner.temp }}\**\sandboxes\*\logs\*
          if-no-files-found: ignore
