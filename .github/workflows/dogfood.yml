name: Dogfood

# Spec-anchored LLM dogfooding pipeline — Phase 2 (the cheap-model journey loop)
# fanned out across KVM workers. This is the CI half of the pipeline; Phase 1
# (intent extraction → journeys.json) and Phase 3 (skeptic + synthesis) run
# locally in Claude Code (see hack/dogfood/README.md + the dogfood skill).
#
# Trigger via workflow_dispatch off a `dogfood-run/<feature>` branch that
# carries a committed journeys file (path given by `journeys_path`, default
# `journeys.json`) at the repo root. NEVER open a PR for that branch —
# ci.yml/app.yml/coverage.yml have `branches-ignore: ['dogfood-run/**']`
# guards so an accidental PR fires no gates, but the discipline is: dispatch
# only. Also runs on a weekly Monday 06:00 UTC cron on `main`, driving the
# committed smoke corpus (`hack/dogfood/journeys/smoke-core-cli.json`) as a
# report-only novice-smoke probe.
#
# Report-only: a run that finds bugs still exits 0. Only infra failures (build,
# boot, artifact fetch) fail a job — the runner exits 0, or 3 when the run
# measured nothing (catastrophic infra: >50% of attempted journeys degraded),
# and always writes a trajectory bundle either way, so we never grep its
# output to fail the job.
#
# The `setup` job derives the shard matrices from the `shards`/`gui_shards`
# inputs AND the journey set itself, so shard counts are a real knob (not a
# hardcoded 3) and the GUI job is skipped entirely when the journey set has no
# modality:"gui" entries. `max_usd` is a PER-SHARD budget cap (see the setup
# job's outputs + the per-job env below).

on:
  workflow_dispatch:
    inputs:
      journeys_path:
        description: 'Path (in the dispatched ref) of the journeys file to run'
        required: false
        default: 'journeys.json'
      shards:
        description: 'Number of CLI journey shards'
        required: false
        default: '3'
      gui_shards:
        description: 'Number of GUI journey shards (GUI jobs are skipped when the journey set has no modality:"gui" entries)'
        required: false
        default: '3'
      model:
        description: 'OpenRouter model id (cheap but tool-capable by default; deepseek-chat was too weak to drive the shell-agent loop reliably)'
        required: false
        default: 'google/gemini-2.5-flash'
      max_usd:
        description: 'PER-SHARD estimated USD cap (worst-case total = max_usd × (cli shards + gui shards))'
        required: false
        default: '2'
  schedule:
    # Weekly novice smoke probe on main: the committed smoke corpus, report-only
    # (owner decision 2026-07-04: manual/weekly only — no push trigger).
    - cron: '0 6 * * 1'

concurrency:
  group: dogfood-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Derive the shard matrices from the inputs + the journey set, so the shard
  # count is a real knob (the old hardcoded 3-shard matrices killed dispatches
  # with any other value) and each modality's jobs are skipped entirely when
  # the set has no journeys for it (3 wasted Tauri builds / a wasted KVM shard
  # matrix otherwise). Both swarm jobs are terminal (nothing `needs:` them),
  # so skipping is safe.
  setup:
    name: plan shards
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      journeys_path: ${{ steps.plan.outputs.journeys_path }}
      cli_shards: ${{ steps.plan.outputs.cli_shards }}
      gui_shards: ${{ steps.plan.outputs.gui_shards }}
      cli_matrix: ${{ steps.plan.outputs.cli_matrix }}
      gui_matrix: ${{ steps.plan.outputs.gui_matrix }}
      has_gui: ${{ steps.plan.outputs.has_gui }}
      has_cli: ${{ steps.plan.outputs.has_cli }}
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - id: plan
        env:
          # schedule fires with empty inputs -> smoke-corpus defaults.
          JOURNEYS_PATH: ${{ github.event_name == 'schedule' && 'hack/dogfood/journeys/smoke-core-cli.json' || inputs.journeys_path || 'journeys.json' }}
          SHARDS: ${{ inputs.shards || '3' }}
          GUI_SHARDS: ${{ inputs.gui_shards || '3' }}
        run: |
          python3 - <<'EOF'
          import json, os
          jp = os.environ["JOURNEYS_PATH"]
          shards = max(1, int(os.environ["SHARDS"]))
          gui_shards = max(1, int(os.environ["GUI_SHARDS"]))
          with open(jp) as f:
              doc = json.load(f)
          journeys = doc.get("journeys", []) or []
          n_gui = sum(1 for j in journeys if j.get("modality") == "gui")
          n_cli = len(journeys) - n_gui
          shards = min(shards, n_cli) or 1
          gui_shards = min(gui_shards, n_gui) or 1
          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a") as f:
              f.write(f"journeys_path={jp}\n")
              f.write(f"cli_shards={shards}\n")
              f.write(f"gui_shards={gui_shards}\n")
              f.write(f"cli_matrix={json.dumps(list(range(shards)))}\n")
              f.write(f"gui_matrix={json.dumps(list(range(gui_shards)))}\n")
              f.write(f"has_gui={'true' if n_gui else 'false'}\n")
              f.write(f"has_cli={'true' if n_cli else 'false'}\n")
          print(f"{jp}: {n_cli} cli journeys -> {shards} shards; "
                f"{n_gui} gui journeys -> {gui_shards} shards")
          EOF

  # Build the microVM artifacts the KVM jobs boot real sandboxes with. Mirrors
  # e2e.yml's kernel/mke2fs/nft/initramfs jobs (same pinned versions + caches).
  kernel:
    name: vmlinux (pinned 6.12.30)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - name: Restore built vmlinux
        id: vmlinux
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: dist/vmlinux
          key: vmlinux-${{ hashFiles('hack/kernel.config', 'hack/build-kernel.sh') }}
      - name: Install kernel build deps
        if: steps.vmlinux.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential flex bison bc libelf-dev
      - name: Build kernel
        if: steps.vmlinux.outputs.cache-hit != 'true'
        run: hack/build-kernel.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vmlinux
          path: dist/vmlinux
          if-no-files-found: error

  mke2fs:
    name: static mke2fs (pinned e2fsprogs 1.47.2)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools
      - run: hack/build-mke2fs.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mke2fs
          path: dist/mke2fs-*-static-x86_64
          if-no-files-found: error

  nft:
    name: static nft (pinned nftables 1.1.3)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - run: hack/build-nft.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nft
          path: dist/nft
          if-no-files-found: error

  sshd:
    name: static sshd (pinned OpenSSH 9.9p2)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - run: hack/build-sshd.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sshd
          path: |
            dist/sshd
            dist/sshd-session
            dist/sftp-server
          if-no-files-found: error

  crun:
    name: static crun (pinned crun 1.28)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      # docker is preinstalled on ubuntu-latest; build-crun.sh builds the static
      # binary (crun + from-source json-c) in a digest-pinned Alpine container.
      # Required by the crun-based OCI runtime — without it every `izba run`
      # fails in-guest with `/sbin/crun not found` (no container can boot).
      - run: hack/build-crun.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: crun
          path: dist/crun
          if-no-files-found: error

  initramfs:
    name: initramfs (izba-init + embedded mke2fs + nft + crun + sshd)
    needs: [mke2fs, nft, crun, sshd]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools cpio
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          prefix-key: initramfs
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mke2fs
          path: dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nft
          path: dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: crun
          path: dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sshd
          path: dist/
      - name: Build initramfs with embedded mke2fs + nft + crun + sshd
        run: |
          files=(dist/mke2fs-*-static-x86_64)
          if [ "${#files[@]}" -ne 1 ] || [ ! -f "${files[0]}" ]; then
            echo "expected exactly 1 mke2fs binary, got: ${files[*]}" >&2
            exit 1
          fi
          [ -f dist/nft ] || { echo "expected dist/nft from the nft job" >&2; exit 1; }
          [ -f dist/crun ] || { echo "expected dist/crun from the crun job" >&2; exit 1; }
          [ -f dist/sshd ] || { echo "expected dist/sshd from the sshd job" >&2; exit 1; }
          [ -f dist/sshd-session ] || { echo "expected dist/sshd-session from the sshd job" >&2; exit 1; }
          [ -f dist/sftp-server ] || { echo "expected dist/sftp-server from the sshd job" >&2; exit 1; }
          chmod 755 "${files[0]}" dist/nft dist/crun dist/sshd dist/sshd-session dist/sftp-server
          IZBA_MKE2FS="${files[0]}" IZBA_NFT=dist/nft IZBA_CRUN=dist/crun IZBA_SSHD=dist/sshd hack/build-initramfs.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: initramfs
          path: dist/initramfs.cpio.gz
          if-no-files-found: error

  # The fan-out. The matrix is derived by `setup` from the `shards` input AND
  # the journey set (never wider than the number of CLI journeys), so the
  # count is a real knob instead of a hardcoded literal.
  dogfood:
    name: dogfood journeys (KVM shard ${{ matrix.shard }})
    needs: [setup, kernel, initramfs]
    if: needs.setup.outputs.has_cli == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.setup.outputs.cli_matrix) }}
    env:
      # Real-VM env, mirroring e2e.yml's linux-kvm leg so `izba create/run` boots
      # actual microVMs.
      IZBA_KERNEL: ${{ github.workspace }}/dist/vmlinux
      IZBA_INITRAMFS: ${{ github.workspace }}/dist/initramfs.cpio.gz
      IZBA_TEST_CACHE: /home/runner/.cache/izba-itest
      IZBA_BOOT_TIMEOUT_SECS: '120'
    steps:
      # Check out the DISPATCHED ref so journeys.json committed on the
      # dogfood-run/<feature> branch is present at the repo root.
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - name: Make /dev/kvm accessible
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm || true
          # /dev/kvm can take a few seconds to show up (or land with lagging
          # perms) on hosted runners; poll instead of failing on the first
          # check. If it never appears the runner genuinely lacks nested
          # virt and failing is correct.
          for i in $(seq 1 15); do
            [ -r /dev/kvm ] && [ -w /dev/kvm ] && exit 0
            sleep 2
            sudo udevadm trigger --name-match=kvm || true
          done
          ls -l /dev/kvm || true
          sudo dmesg | grep -i kvm | tail -5 || true
          exit 1
      # virtiofsd --sandbox namespace mounts inside an unprivileged user
      # namespace, which the default Ubuntu 24.04 AppArmor restriction blocks.
      # Same relaxation as e2e.yml's linux-kvm gate. Guarded: the knob only
      # exists on AppArmor-enabled kernels.
      - name: Allow unprivileged user namespaces (virtiofsd --sandbox namespace)
        run: |
          if [ -e /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          else
            echo "apparmor_restrict_unprivileged_userns knob absent — nothing to relax"
          fi
      - name: Restore runtime tools
        id: tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.local/bin/cloud-hypervisor
            ~/.local/bin/virtiofsd
            ~/.local/bin/mkfs.erofs
          key: e2e-tools-${{ hashFiles('hack/fetch-artifacts.sh', 'hack/build-mkfs-erofs-windows.sh') }}
      - name: Build runtime tools (cache miss)
        if: steps.tools.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl tar make gcc autoconf automake libtool-bin pkg-config patch \
            unzip file
          mkdir -p "$HOME/.local/bin"
          IZBA_BIN_DIR="$HOME/.local/bin" hack/fetch-artifacts.sh || true
          hack/build-mkfs-erofs-windows.sh --linux-only
          install -m755 "$HOME/.cache/izba/erofs-utils/build-linux/mkfs/mkfs.erofs" "$HOME/.local/bin/mkfs.erofs"
      - name: Assert tools present
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          for t in cloud-hypervisor virtiofsd mkfs.erofs; do
            command -v "$t" || { echo "missing $t" >&2; exit 1; }
          done
          mkfs.erofs --version
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: vmlinux
          path: dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: initramfs
          path: dist/
      - name: Restore OCI test-image cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /home/runner/.cache/izba-itest
          key: izba-itest-alpine-3.20
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          prefix-key: dogfood-linux
      - name: Build izba binary
        run: cargo build --locked --release -p izba-cli
      - name: Run dogfood journeys (report-only)
        # workflow_dispatch inputs are user-controlled: pass them through `env:`
        # and reference shell vars in the script (never interpolate `${{ inputs.* }}`
        # straight into a run block) to avoid script injection (githubactions:S7630).
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SHARD: ${{ matrix.shard }}
          SHARDS: ${{ needs.setup.outputs.cli_shards }}
          JOURNEYS_PATH: ${{ needs.setup.outputs.journeys_path }}
          MODEL: ${{ inputs.model || 'google/gemini-2.5-flash' }}
          MAX_USD: ${{ inputs.max_usd || '2' }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          # Short data-dir base: the sandbox runtime socket lives under
          # <data-dir>/sandboxes/<name>/run/vsock.sock_1027 and must fit the
          # ~108-byte AF_UNIX sun_path limit; $RUNNER_TEMP is too deep (izba#71).
          # The Actor (a real shell user) reads the same docs a user would: the
          # product README + the run-specific context pack (its environment).
          # Both live at the repo root on the dispatched branch.
          python3 hack/dogfood/run_journeys.py \
            --journeys "$JOURNEYS_PATH" \
            --shard "$SHARD" \
            --shards "$SHARDS" \
            --izba-bin "$PWD/target/release/izba" \
            --data-dir "/tmp/izd-$SHARD" \
            --out "traj-$SHARD.json" \
            --model "$MODEL" \
            --max-usd "$MAX_USD" \
            --readme README.md \
            --context-pack dogfood-context.md \
            --action-timeout-s 120 \
            --step-cap 25
      - name: Upload trajectory bundle
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: traj-${{ matrix.shard }}
          path: traj-${{ matrix.shard }}.json
          if-no-files-found: warn
      - name: Job summary
        if: always()
        run: python3 hack/dogfood/summarize_bundle.py "traj-$SHARD.json" >> "$GITHUB_STEP_SUMMARY" || true
        env:
          SHARD: ${{ matrix.shard }}
      - name: Upload sandbox logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dogfood-${{ matrix.shard }}-failure-logs
          path: |
            /tmp/izd-${{ matrix.shard }}/*/sandboxes/*/logs/*
          if-no-files-found: ignore

  dogfood-gui:
    name: dogfood GUI journeys (KVM shard ${{ matrix.shard }})
    needs: [setup, kernel, initramfs]
    if: needs.setup.outputs.has_gui == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 70
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.setup.outputs.gui_matrix) }}
    env:
      IZBA_KERNEL: ${{ github.workspace }}/dist/vmlinux
      IZBA_INITRAMFS: ${{ github.workspace }}/dist/initramfs.cpio.gz
      IZBA_TEST_CACHE: /home/runner/.cache/izba-itest
      IZBA_BOOT_TIMEOUT_SECS: '120'
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - name: Make /dev/kvm accessible
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm || true
          # /dev/kvm can take a few seconds to show up (or land with lagging
          # perms) on hosted runners; poll instead of failing on the first
          # check. If it never appears the runner genuinely lacks nested
          # virt and failing is correct.
          for i in $(seq 1 15); do
            [ -r /dev/kvm ] && [ -w /dev/kvm ] && exit 0
            sleep 2
            sudo udevadm trigger --name-match=kvm || true
          done
          ls -l /dev/kvm || true
          sudo dmesg | grep -i kvm | tail -5 || true
          exit 1
      - name: Allow unprivileged user namespaces (virtiofsd --sandbox namespace)
        run: |
          if [ -e /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi
      - name: Restore runtime tools
        id: tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.local/bin/cloud-hypervisor
            ~/.local/bin/virtiofsd
            ~/.local/bin/mkfs.erofs
          key: e2e-tools-${{ hashFiles('hack/fetch-artifacts.sh', 'hack/build-mkfs-erofs-windows.sh') }}
      - name: Build runtime tools (cache miss)
        if: steps.tools.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl tar make gcc autoconf automake libtool-bin pkg-config patch unzip file
          mkdir -p "$HOME/.local/bin"
          IZBA_BIN_DIR="$HOME/.local/bin" hack/fetch-artifacts.sh || true
          hack/build-mkfs-erofs-windows.sh --linux-only
          install -m755 "$HOME/.cache/izba/erofs-utils/build-linux/mkfs/mkfs.erofs" "$HOME/.local/bin/mkfs.erofs"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { name: vmlinux, path: dist/ }
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { name: initramfs, path: dist/ }
      - name: Restore OCI test-image cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with: { path: /home/runner/.cache/izba-itest, key: izba-itest-alpine-3.20 }
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with: { prefix-key: dogfood-gui-linux }
      # The headless bridge sidecar lives in the izba-app (Tauri) crate, so
      # building `--bin headless` compiles `tauri` and needs the GTK/glib/webkit
      # Linux system libraries — same set the App CI job installs. Without this
      # the build fails on `glib-sys` (pkg-config can't find glib-2.0).
      - name: Install Tauri system deps (for the headless bridge sidecar)
        uses: ./.github/actions/cache-apt-pkgs
        with:
          packages: >-
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev
            librsvg2-dev build-essential file libxdo-dev libssl-dev patchelf
          version: 1.0
      - name: Build izba binary + headless bridge sidecar
        run: |
          cargo build --locked --release -p izba-cli
          (cd app/src-tauri && cargo build --release --bin headless)
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with: { node-version: '20' }
      - name: Build dogfood frontend
        run: cd app && npm ci && npm run build:dogfood
      - name: Install agent-browser (pinned) + browser
        run: |
          npm i -g agent-browser@0.31.1
          agent-browser install --with-deps
      - name: Run GUI dogfood journeys (report-only)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SHARD: ${{ matrix.shard }}
          GUI_SHARDS: ${{ needs.setup.outputs.gui_shards }}
          JOURNEYS_PATH: ${{ needs.setup.outputs.journeys_path }}
          MODEL: ${{ inputs.model || 'google/gemini-2.5-flash' }}
          MAX_USD: ${{ inputs.max_usd || '2' }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          python3 hack/dogfood/gui/run_gui_journeys.py \
            --journeys "$JOURNEYS_PATH" \
            --shard "$SHARD" --shards "$GUI_SHARDS" \
            --izba-bin "$PWD/target/release/izba" \
            --sidecar-bin "$PWD/app/src-tauri/target/release/headless" \
            --frontend-dir "$PWD/app/dist" \
            --data-dir "/tmp/izd-gui-$SHARD" \
            --out "gui-traj-$SHARD.json" \
            --artifact-dir "gui-shots-$SHARD" \
            --model "$MODEL" --max-usd "$MAX_USD" \
            --readme README.md --app-guide dogfood-app-guide.md \
            --action-timeout-s 30 --step-cap 20
      - name: Upload GUI trajectory bundle
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gui-traj-${{ matrix.shard }}
          path: |
            gui-traj-${{ matrix.shard }}.json
            gui-shots-${{ matrix.shard }}/**
          if-no-files-found: warn
      - name: Job summary
        if: always()
        run: python3 hack/dogfood/summarize_bundle.py "gui-traj-$SHARD.json" >> "$GITHUB_STEP_SUMMARY" || true
        env:
          SHARD: ${{ matrix.shard }}
      - name: Upload sandbox logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dogfood-gui-${{ matrix.shard }}-failure-logs
          path: |
            /tmp/izd-gui-${{ matrix.shard }}/*/sandboxes/*/logs/*
          if-no-files-found: ignore
