name: CI

on:
  pull_request:
    # Dispatch branches carry an ad-hoc journeys.json and are exercised only via
    # the Dogfood workflow_dispatch; an accidental PR off one must fire no gates.
    branches-ignore: ['dogfood-run/**']
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linux-gates:
    name: fmt + clippy + test (linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          prefix-key: linux-gates
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  cross-gates:
    name: musl init + windows-gnu checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - name: Install cross toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools gcc-mingw-w64-x86-64
      - run: rustup target add x86_64-unknown-linux-musl x86_64-pc-windows-gnu
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          prefix-key: cross-gates
      - run: cargo build -p izba-init --target x86_64-unknown-linux-musl --release
      - run: cargo check --target x86_64-pc-windows-gnu -p izba-proto -p izba-core -p izba-cli -p izba-jail-helper -p izba-jail-naming
      - run: cargo clippy --target x86_64-pc-windows-gnu --all-targets -p izba-proto -p izba-core -p izba-cli -p izba-jail-helper -p izba-jail-naming -- -D warnings

  windows-native:
    name: cargo test (windows)
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          prefix-key: windows-native
      - run: cargo test -p izba-proto -p izba-core -p izba-cli

  fuzz-smoke:
    name: cargo-fuzz smoke (build + 45 s run per target)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - name: Install nightly toolchain
        # rust-toolchain.toml lists the musl target, which rustup also adds to
        # nightly here. cargo-fuzz would then build for musl, where ASAN can't
        # link against the static libc ("sanitizer is incompatible with
        # statically linked libc"). Ensure the gnu target is present and pass
        # --target x86_64-unknown-linux-gnu explicitly on every run below.
        run: |
          rustup toolchain install nightly
          rustup target add x86_64-unknown-linux-gnu --toolchain nightly
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-fuzz
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          prefix-key: fuzz-smoke
      - name: fuzz izba-proto (frame, dns)
        run: |
          cd crates/izba-proto
          cargo +nightly fuzz run frame --target x86_64-unknown-linux-gnu -- -max_total_time=45
          cargo +nightly fuzz run dns   --target x86_64-unknown-linux-gnu -- -max_total_time=45
      - name: fuzz izba-core (flatten)
        run: |
          cd crates/izba-core
          cargo +nightly fuzz run flatten --target x86_64-unknown-linux-gnu -- -max_total_time=45
      - name: fuzz izba-init (tar_extract)
        run: |
          cd crates/izba-init
          cargo +nightly fuzz run tar_extract --target x86_64-unknown-linux-gnu -- -max_total_time=45

  cargo-deny:
    name: cargo-deny (supply-chain gate, F-22)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: EmbarkStudios/cargo-deny-action@8f84122a46a358a27cb0625d85ad60ab436a1b87 # v2
        with:
          command: check advisories bans licenses sources

  dogfood-harness:
    # The LLM-dogfooding harness (hack/dogfood/**) is pure-stdlib Python with its
    # own unit tests, but nothing gated them before — dogfood.yml only RUNS the
    # harness, never its tests, so a harness regression could land green. This
    # job is that missing gate. venv-isolated so `pip` works on the PEP-668
    # externally-managed system Python of ubuntu-latest without --break-system.
    name: dogfood harness tests (python)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - name: Run dogfood harness tests
        run: |
          python3 -m venv /tmp/dfvenv
          # jsonschema is what dispatch-swarm.sh uses to validate a journeys.json;
          # installing it here lets the fixture-validation test actually run.
          /tmp/dfvenv/bin/pip install --quiet pytest jsonschema
          # Covers the unittest.TestCase suites (CLI runner + oracles) AND the
          # pytest-style GUI + schema tests in one pass.
          /tmp/dfvenv/bin/pytest hack/dogfood -q
