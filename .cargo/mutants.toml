# .cargo/mutants.toml — single source of truth for what cargo-mutants may mutate.
#
# We exclude ONLY the class of code with a hard requirement on a real VM
# (KVM/WHP): the VMM drivers and the env-gated integration/e2e harnesses. Their
# tests SELF-SKIP on hosted runners, so a mutant there can never be killed on any
# hosted runner — on either platform.
#
# We deliberately do NOT exclude platform-specific (#[cfg(windows)] /
# #[cfg(unix)]) code. cargo-mutants cannot see #[cfg] (documented limitation:
# https://mutants.rs/limitations.html) and reports another platform's code as
# "missed" where it is cfg'd out. Instead of excluding it, mutants.yml runs the
# SAME mutant set on BOTH Linux and Windows and the reporter applies the
# caught-nowhere rule: a mutant is a real survivor only if NO platform caught it.
# So a cfg(windows) mutant is "missed" on Linux (cfg'd out) but "caught" on
# Windows — and correctly dropped. Per-item exceptions still use
# `#[mutants::skip]` WITH a justification comment (see CONTRIBUTING.md).

exclude_globs = [
    "crates/izba-core/src/vmm/**",        # Cloud Hypervisor / OpenVMM drivers — need a real VM
    "crates/izba-core/tests/**",          # KVM-gated integration harness
    "crates/izba-cli/tests/**",           # daemon_e2e + tty e2e: KVM/PTY-gated
    "crates/izba-ttytest/**",             # drives a real binary through a PTY
    # NOTE: only real-VM (KVM/WHP) code belongs here — NOT platform-cfg code,
    # which the two-platform caught-nowhere run handles.
]

# Per-mutant exclusions for mutants that are NOT worth (or cannot have) a killing
# test. Unlike `exclude_globs` (whole real-VM files) these drop a single mutant by
# NAME — the regex matches `<path>:<line>:<col>: <description>`, anchored on file +
# operator (or function name), never on a bare line number, so it survives line
# drift.
#
# RISK: cargo-mutants does NOT warn if an exclude_re goes stale (matches nothing)
# or broadens (matches a new, real mutant) — it would silently hide a survivor.
# So EVERY entry here is pinned to the exact mutant(s) it may match in
# `hack/mutants-check-excludes.py`, which fails CI on any drift (stale or
# over-broad). Adding/changing a pattern here REQUIRES updating that pin.
# Each entry also justifies itself at its in-source site.
exclude_re = [
    # codec.rs MAX_FRAME = 16 * 1024 * 1024: `* -> +`/`* -> /` on a size literal —
    # only a tautological `assert_eq!(MAX_FRAME, 16_777_216)` could "kill" it.
    "codec\\.rs:\\d+:\\d+: replace \\* with",
    # dns.rs servfail `(resp[3] & 0xf0) | 0x02`: the `| -> ^` mutant is EQUIVALENT
    # (the mask clears bit 0x02, so `|` and `^` always agree) and thus unkillable.
    # Named exclusion keeps servfail's other mutants under test, unlike a
    # function-wide `#[mutants::skip]`.
    "replace \\| with \\^ in servfail",
    # tarfs.rs (guest cp extract/create) — see the "Mutation note" blocks there.
    # The open-flag `| -> ^` mutants are EQUIVALENT: `O_RDONLY` is 0
    # (`0 ^ x == 0 | x`) and `O_DIRECTORY`/`O_CLOEXEC` are disjoint bits
    # (`^ == |`). The killable `| -> &` mutants (which DROP `O_DIRECTORY`) stay
    # under test — they are caught by the new open_root_dir/unpack_one tests.
    "tarfs\\.rs:\\d+:\\d+: replace \\| with \\^ in open_root_dir",
    "tarfs\\.rs:\\d+:\\d+: replace \\| with \\^ in classify",
    "tarfs\\.rs:\\d+:\\d+: replace \\| with \\^ in unpack_one",
    "tarfs\\.rs:\\d+:\\d+: replace \\| with \\^ in extract",
    # extract's `Missing` branch: `| -> &` (dropping O_DIRECTORY) is EQUIVALENT —
    # reaching `Missing` means `classify` already resolved the dest to ENOENT,
    # which proves every prefix (this parent) is a traversable directory.
    "tarfs\\.rs:\\d+:\\d+: replace \\| with & in extract",
    # classify's ENOTDIR guard forced true is EQUIVALENT — the only error
    # `O_DIRECTORY` adds is ENOTDIR; any other Internal errno also fails the
    # plain retry, so it propagates identically with or without the guard.
    "tarfs\\.rs:\\d+:\\d+: replace match guard msg.contains\\(\"ENOTDIR\"\\) with true in classify",
]

# Give the suite headroom: some host tests spawn processes / do timed I/O.
timeout_multiplier = 3.0
minimum_test_timeout = 60
