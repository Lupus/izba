sonar.projectKey=Lupus_izba
sonar.organization=lupus

# --- Rust coverage ---
# Coverage is produced by hack/coverage.sh (cargo-llvm-cov) and consumed here;
# Sonar never generates coverage, it only imports the LCOV this path points at.
#
# PR analysis (coverage.yml) writes the host-workspace report here. The
# main-branch analysis (e2e.yml `linux-kvm-coverage`) produces a richer
# host+real-VM report at target/coverage/lcov-e2e.info and overrides this path
# via -Dsonar.rust.lcov.reportPaths on the scan step. hack/coverage.sh already
# strips test harnesses (/tests/, build.rs) from the report.
sonar.rust.lcov.reportPaths=target/coverage/lcov.info

# --- Frontend (app/) coverage ---
# vitest (v8 provider) emits app/-relative SF paths; coverage.yml rewrites them
# to repo-root-relative (prefix `app/`) before the scan so they resolve here.
sonar.javascript.lcov.reportPaths=app/coverage/lcov.info

# Mirror app/vite.config.ts's coverage `exclude` so files that aren't unit-test
# targets (test sources, type-only modules, the entrypoint/wiring) don't get
# counted as uncovered new code and sink the gate.
#
# NOTE: `sonar.coverage.exclusions` must appear EXACTLY ONCE — a properties file
# keeps only the last value for a duplicate key, so a second occurrence silently
# clobbers this one. The Rust `examples/**` exclusion (rationale further down) is
# therefore folded into this single list, not given its own key.
sonar.coverage.exclusions=app/src/**/*.test.ts,app/src/**/*.test.tsx,app/src/test/**,app/src/main.tsx,app/src/lib/types.ts,**/examples/**

# Frontend test sources are not production code: keep them out of copy-paste
# detection too (coverage.exclusions alone does not stop CPD), so shared test
# boilerplate (xterm/ipc mock preambles, repeated render+assert blocks) does not
# count against the new-code duplication gate.
sonar.cpd.exclusions=app/src/**/*.test.ts,app/src/**/*.test.tsx,app/src/test/**

# Keep generated/vendored trees out of analysis (target/ is the cargo build
# output incl. instrumented coverage builds; node_modules + the built dist/ are
# the app/ frontend).
sonar.exclusions=**/target/**,dist/**,**/node_modules/**,app/dist/**

# --- Accepted GitHub Actions findings on first-party CI workflows ---
# githubactions:S6505 wants `npm ci --ignore-scripts`. Our workflows build the
# Tauri app (app.yml / release.yml / devbuild.yml), whose toolchain REQUIRES npm
# lifecycle scripts (esbuild / @tauri-apps/cli platform-binary setup) — running
# with --ignore-scripts breaks the build. The installed deps come from the
# committed package-lock.json, so this is an intentional, reviewed acceptance,
# scoped to .github/workflows/ only (cargo build now uses --locked separately).
sonar.issue.ignore.multicriteria=gha1
sonar.issue.ignore.multicriteria.gha1.ruleKey=githubactions:S6505
sonar.issue.ignore.multicriteria.gha1.resourceKey=**/.github/workflows/**

# New-code coverage exclusions (folded into the single sonar.coverage.exclusions
# above so the keys don't clobber each other). The per-PR coverage feed
# (coverage.yml) merges a Linux host lcov AND a Windows host lcov, so
# #[cfg(windows)] code IS measured on PRs now. What remains excluded cannot be
# unit-tested on either runner:
#   - examples/**            dev/test harnesses, not unit-tested (e.g. confine_probe)
# procmgr/jail_windows.rs is NO LONGER excluded: coverage.yml's coverage-windows
# job runs its #[cfg(windows)] FFI unit tests and feeds that lcov to the scan, so
# the VMM jailer is genuinely measured (defense-in-depth alongside the Windows
# e2e). All code stays fully ANALYZED for issues/security regardless.

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=izba
#sonar.projectVersion=1.0


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
# Left unset: the Rust analyzer auto-discovers sources from Cargo.toml.
#sonar.sources=.

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8
