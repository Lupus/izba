sonar.projectKey=Lupus_izba
sonar.organization=lupus

# --- Rust coverage ---
# Coverage is produced by hack/coverage.sh (cargo-llvm-cov) and consumed here;
# Sonar never generates coverage, it only imports the LCOV this path points at.
#
# PR analysis (coverage.yml) writes the host-workspace report here. The
# main-branch analysis (e2e.yml `linux-kvm-coverage`) produces a richer
# host+real-VM report at target/coverage/lcov-e2e.info and overrides this path
# via -Dsonar.rust.lcov.reportPaths on the scan step. hack/coverage.sh already
# strips test harnesses (/tests/, build.rs) from the report.
sonar.rust.lcov.reportPaths=target/coverage/lcov.info

# --- Frontend (app/) coverage ---
# vitest (v8 provider) emits app/-relative SF paths; coverage.yml rewrites them
# to repo-root-relative (prefix `app/`) before the scan so they resolve here.
sonar.javascript.lcov.reportPaths=app/coverage/lcov.info

# Mirror app/vite.config.ts's coverage `exclude` so files that aren't unit-test
# targets (test sources, type-only modules, the entrypoint/wiring) don't get
# counted as uncovered new code and sink the gate.
#
# NOTE: `sonar.coverage.exclusions` must appear EXACTLY ONCE — a properties file
# keeps only the last value for a duplicate key, so a second occurrence silently
# clobbers this one. The Rust `examples/**` exclusion (rationale further down) is
# therefore folded into this single list, not given its own key.
#
# hack/dogfood/** is the LLM dogfooding test harness (a CI tool, not product
# code — the analog of examples/**); its OpenRouter HTTP + subprocess-driving
# glue cannot be unit-covered on a runner. crates/izba-cli/src/commands/{reconcile,
# volume,start,run}.rs are thin daemon-connect/print wiring for `izba __reconcile`
# / `izba volume` / `izba start` / `izba run`: each connects to izbad (which spawns
# a daemon) and starts/execs/tears down a real microVM, so the request/print paths
# are exercised only by the KVM-gated daemon_e2e, not on a coverage runner.
# reconcile's real logic lives in izba-core::reconcile; volume's testable confirm
# decision is unit-tested via `confirm_with`/`is_affirmative`; start's existence
# resolution via `ensure_exists` and run's pure helpers (`resolve_build_context`,
# `ignored_create_opts`, `reconcile_existing`) are unit-tested too — only the
# daemon glue (`run`/`run_inner`/`start::run`, all `#[mutants::skip]` e2e-only) is
# uncovered, and it IS covered by daemon_e2e's `cli_surface_lifecycle`. hack/**/*.py
# is the mutation-testing reporter tooling (exercised by the reporter-tests job,
# not run under a coverage reporter). All stay fully ANALYZED for issues/security
# — only excluded from the new-code coverage gate.
sonar.coverage.exclusions=app/src/**/*.test.ts,app/src/**/*.test.tsx,app/src/test/**,app/src/main.tsx,app/src/lib/types.ts,app/vite.config.ts,app/playwright.config.ts,**/examples/**,hack/dogfood/**,crates/izba-cli/src/commands/reconcile.rs,crates/izba-cli/src/commands/volume.rs,crates/izba-cli/src/commands/start.rs,crates/izba-cli/src/commands/run.rs,hack/**/*.py,app/src-tauri/src/bin/headless.rs,app/dogfood/real-bridge.js,app/dogfood/inject.mjs,app/dogfood/inject.d.mts,app/src/vite-env.d.ts

# Frontend test sources are not production code: keep them out of copy-paste
# detection too (coverage.exclusions alone does not stop CPD), so shared test
# boilerplate (xterm/ipc mock preambles, repeated render+assert blocks) does not
# count against the new-code duplication gate. The same applies to the Rust
# integration-test suites under crates/*/tests/** (e.g. daemon_e2e.rs): each
# `#[test]` boots a sandbox with the same `run … -- /bin/true` preamble + `rm`
# cleanup, which CPD would otherwise flag as duplicated new code — that repetition
# is inherent to per-scenario e2e tests, not a product-code smell.
sonar.cpd.exclusions=app/src/**/*.test.ts,app/src/**/*.test.tsx,app/src/test/**,crates/*/tests/**

# Keep generated/vendored trees out of analysis (target/ is the cargo build
# output incl. instrumented coverage builds; node_modules + the built dist/ are
# the app/ frontend).
#
# .github/actions/cache-apt-pkgs/** is a vendored, de-blobbed fork of
# awalsh128/cache-apt-pkgs-action (see that dir's NOTICE.md). It is deliberately
# kept close to upstream so it stays auditable against the original, so its
# upstream shell idioms (`test`/`[` instead of `[[`, no explicit-return at
# function ends, upstream variable casing) are not first-party code smells we
# want to "fix" — rewriting them to our conventions would diverge from upstream
# for no behavioural gain. Excluded from analysis like any other vendored tree.
# (The two security-relevant findings we DID care about — a weak md5 cache key
# and an http example URL — were fixed in-tree, not suppressed.)
# app/e2e/** is the Playwright e2e suite — test scaffolding, not product code,
# validated by execution (App CI runs it on chromium+webkit). It carries test
# fixtures (sample endpoint IPs/hosts in the netlog/policy specs) that would
# otherwise raise S1313 hardcoded-IP hotspots and sink the Security Rating gate,
# and it has no coverage instrumentation so it would count as 0%-covered new
# code. Excluded from analysis like the other non-first-party/test trees.
# **/fuzz/** is the cargo-fuzz harness tree (libfuzzer boilerplate, no coverage
# instrumentation); **/proptest-regressions/** are committed proptest seed
# corpora (data, not source). Both excluded so they don't sink the new-code
# coverage gate.
sonar.exclusions=**/target/**,dist/**,**/node_modules/**,app/dist/**,.github/actions/cache-apt-pkgs/**,app/e2e/**,**/fuzz/**,**/proptest-regressions/**

# --- Accepted GitHub Actions findings on first-party CI workflows ---
# githubactions:S6505 wants `npm ci --ignore-scripts`. Our workflows build the
# Tauri app (app.yml / release.yml / devbuild.yml), whose toolchain REQUIRES npm
# lifecycle scripts (esbuild / @tauri-apps/cli platform-binary setup) — running
# with --ignore-scripts breaks the build. The installed deps come from the
# committed package-lock.json, so this is an intentional, reviewed acceptance,
# scoped to .github/workflows/ only (cargo build now uses --locked separately).
sonar.issue.ignore.multicriteria=gha1,dog1,dog2,py1,dog3,dog4
sonar.issue.ignore.multicriteria.gha1.ruleKey=githubactions:S6505
sonar.issue.ignore.multicriteria.gha1.resourceKey=**/.github/workflows/**

# --- Accepted LLM-harness findings on hack/dogfood/** ---
# The dogfooding runner's entire purpose is to execute izba commands chosen by an
# LLM and observe the result; pythonsecurity:S8701 ("LLM-run command can escape a
# shell sandbox") and S8707 ("LLM-constructed path can escape the filesystem")
# therefore fire on the harness by design. The code is already written safely:
# every command runs via the argv-LIST form of subprocess (no shell) with the
# fixed, operator-supplied izba binary as argv[0] (oracles.py), and the only
# constructed paths are operator-supplied CLI args from the trusted CI workflow
# (run_journeys.py), not model output. The runner itself is sandboxed twice over
# (an ephemeral CI runner, driving izba which sandboxes the workload). Intentional,
# reviewed acceptance scoped to the harness dir only, mirroring gha1 above.
sonar.issue.ignore.multicriteria.dog1.ruleKey=pythonsecurity:S8701
sonar.issue.ignore.multicriteria.dog1.resourceKey=**/hack/dogfood/**
sonar.issue.ignore.multicriteria.dog2.ruleKey=pythonsecurity:S8707
sonar.issue.ignore.multicriteria.dog2.resourceKey=**/hack/dogfood/**

# pythonsecurity:S8707 also flags hack/mutants-report.py — the CI-internal
# mutation-testing reporter. Its only callers are our own workflow
# (.github/workflows/mutants.yml) and the local gate wrapper, which pass fixed,
# operator-controlled paths — no untrusted/external input, no filesystem trust
# boundary. Scoped acceptance on hack/**/*.py (covers the reporter; dog2 already
# covers the dogfood harness), mirroring the gha1/dog* acceptances above; the
# script stays fully analyzed for every other rule.
sonar.issue.ignore.multicriteria.py1.ruleKey=pythonsecurity:S8707
sonar.issue.ignore.multicriteria.py1.resourceKey=hack/**/*.py

# --- GUI-dogfood harness acceptances (mirror the dog1/dog2/gha1 rationale) ---
# dog3: githubactions:S8549 ("dependencies without locked resolved versions")
# fires on `npm i -g agent-browser@0.31.1` in dogfood.yml. The version IS exact-
# pinned; a global npm install cannot use a lockfile, so there is no code fix.
# Scoped to the dogfood workflow only — real unpinned installs elsewhere still fire.
sonar.issue.ignore.multicriteria.dog3.ruleKey=githubactions:S8549
sonar.issue.ignore.multicriteria.dog3.resourceKey=**/.github/workflows/dogfood.yml
# dog4: pythonsecurity:S8705 ("LLM-run command can escape a shell sandbox") fires
# on the GUI driver spawning agent-browser from LLM-chosen actions. Safe by
# construction: the argv-LIST form of subprocess (no shell) with the fixed,
# operator-supplied agent-browser binary as argv[0], and `_validate_args`
# allowlists the subcommand + checks ref shapes before spawning. Same rationale
# as dog1 (S8701), scoped to the harness dir only.
sonar.issue.ignore.multicriteria.dog4.ruleKey=pythonsecurity:S8705
sonar.issue.ignore.multicriteria.dog4.resourceKey=**/hack/dogfood/**

# New-code coverage exclusions (folded into the single sonar.coverage.exclusions
# above so the keys don't clobber each other). The per-PR coverage feed
# (coverage.yml) merges a Linux host lcov AND a Windows host lcov, so
# #[cfg(windows)] code IS measured on PRs now. What remains excluded cannot be
# unit-tested on either runner:
#   - examples/**            dev/test harnesses, not unit-tested (e.g. confine_probe)
#   - hack/**/*.py           CI-internal mutation-testing tooling, not shipped
#                            product; its logic is exercised by the
#                            `reporter-tests` job (hack/mutants-report.test.py),
#                            which we don't run under a coverage reporter.
# procmgr/jail_windows.rs is NO LONGER excluded: coverage.yml's coverage-windows
# job runs its #[cfg(windows)] FFI unit tests and feeds that lcov to the scan, so
# the VMM jailer is genuinely measured (defense-in-depth alongside the Windows
# e2e). All code stays fully ANALYZED for issues/security regardless.

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=izba
#sonar.projectVersion=1.0


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
# Left unset: the Rust analyzer auto-discovers sources from Cargo.toml.
#sonar.sources=.

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8
